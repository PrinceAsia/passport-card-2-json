services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: document-ocr-api:latest
    container_name: document-ocr-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      APP_ENV: production
      LOG_LEVEL: INFO
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
